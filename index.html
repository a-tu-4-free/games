<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的 JS 遊戲大廳</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    body { background: linear-gradient(135deg, #0f172a 0%, #1e2937 100%); }
    .game-card { transition: all 0.3s ease; }
    .game-card:hover { transform: translateY(-12px) scale(1.03); }
    .glass { background: rgba(255,255,255,0.08); backdrop-filter: blur(12px); }
  </style>
</head>
<body class="min-h-screen text-white">
  <div class="max-w-7xl mx-auto px-6 py-12">
    <div class="text-center mb-12">
      <h1 class="text-5xl font-bold mb-3">🎮 我的遊戲大廳</h1>
      <p class="text-slate-400 text-xl">收集各種有趣的 JavaScript 小遊戲</p>
    </div>

    <div class="max-w-md mx-auto mb-10">
      <input type="text" id="searchInput" 
             placeholder="搜尋遊戲名稱..." 
             class="w-full bg-slate-800/70 border border-slate-600 rounded-2xl px-6 py-4 focus:outline-none focus:border-blue-500 text-lg">
    </div>

    <div id="gameGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8">
      <!-- 動態產生 -->
    </div>
  </div>

  <script>
    let games = [];

    async function loadGames() {
      try {
        const res = await fetch('games.json');
        const data = await res.json();
        games = data.games;
        renderGames(games);
      } catch (e) {
        console.error("載入 games.json 失敗", e);
      }
    }

    function renderGames(filteredGames) {
      const grid = document.getElementById('gameGrid');
      grid.innerHTML = '';

      filteredGames.forEach(game => {
        const card = document.createElement('a');
        card.href = game.path;
        card.target = "_blank";
        card.className = `game-card block p-6 rounded-3xl glass border border-slate-700 hover:border-blue-500 group`;
        
        card.innerHTML = `
          <div class="text-6xl mb-6 transition-transform group-hover:scale-110">${game.icon}</div>
          <h3 class="text-2xl font-semibold mb-2">${game.title}</h3>
          <p class="text-slate-400">${game.desc}</p>
          <div class="mt-6 pt-6 border-t border-slate-700 text-blue-400 text-sm flex items-center gap-2">
            開始遊戲 <i class="fas fa-arrow-right ml-1 transition-transform group-hover:translate-x-1"></i>
          </div>
        `;
        grid.appendChild(card);
      });
    }

    // 搜尋功能
    document.getElementById('searchInput').addEventListener('input', (e) => {
      const term = e.target.value.toLowerCase();
      const filtered = games.filter(g => 
        g.title.toLowerCase().includes(term) || g.desc.toLowerCase().includes(term)
      );
      renderGames(filtered);
    });

    // 載入遊戲
    loadGames();
  </script>
</body>
</html>
